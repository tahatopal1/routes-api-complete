spring.application.name=routes-app

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/routes_db?allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:vLUWqsSB}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mvUkveLN}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.user=${SPRING_DATASOURCE_USERNAME:vLUWqsSB}
spring.flyway.password=${SPRING_DATASOURCE_PASSWORD:mvUkveLN}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
