version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: routes-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: AWsWFMYz
      MYSQL_DATABASE: routes_db
      MYSQL_USER: vLUWqsSB
      MYSQL_PASSWORD: mvUkveLN
    ports:
      - "3306:3306"
    command: >
      --skip-ssl 
      --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
